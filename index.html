<!DOCTYPE html>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* 3D Flip Card Styles */
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { 
            backface-visibility: hidden; 
            -webkit-backface-visibility: hidden; 
        }
        .rotate-y-180 { transform: rotateY(180deg); }
        .flip-transition { transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); }
        
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.02); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }

        /* Animations */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Quiz Option Button Styles */
        .quiz-option {
            transition: all 0.2s ease;
        }
        .quiz-option:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .quiz-option:active:not(:disabled) {
            transform: translateY(0);
        }
        .quiz-option.correct {
            background-color: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
        }
        .quiz-option.wrong {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
        }
    </style>
</head>

    <script>
        // --- GEMINI API CONFIG ---
        const apiKey = ""; 

        // Unified Toast Error display
        function showToast(message, isError = true) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-xl shadow-lg text-sm font-medium fade-in flex items-center gap-3 ${isError ? 'bg-red-600 text-white' : 'bg-emerald-600 text-white'}`;
            toast.innerHTML = `<i data-lucide="${isError ? 'alert-triangle' : 'check-circle'}" class="w-5 h-5"></i> <span>${message}</span>`;
            
            container.appendChild(toast);
            lucide.createIcons();

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(10px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 5000);
        }

        async function fetchWithRetry(url, options, retries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        // Immediately throw auth errors without retrying and delaying
                        if (response.status === 401 || response.status === 403) {
                            throw new Error(`HTTP error! status: ${response.status}`);
                        }
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return await response.json();
                } catch (error) {
                    if (error.message.includes('401') || error.message.includes('403') || i === retries - 1) {
                        throw error;
                    }
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        }

        // Fuzzy Match Deduplication Check
        // Compares significant keywords to find variations/rephrasings
        function isDuplicateQuestion(newQuestionText, existingQuestions) {
            const extractKeywords = text => text.toLowerCase().replace(/[^a-z0-9\s]/g, '').split(/\s+/).filter(w => w.length > 3);
            const newWords = extractKeywords(newQuestionText);
            
            if (newWords.length === 0) return false;
            
            return existingQuestions.some(existing => {
                const existingWords = extractKeywords(existing.q);
                if (existingWords.length === 0) return false;
                
                // Count how many words overlap
                const intersection = newWords.filter(w => existingWords.includes(w));
                // If more than 60% of the significant words match, consider it a duplicate
                const overlapRatio = intersection.length / Math.min(newWords.length, existingWords.length);
                return overlapRatio > 0.6;
            });
        }

        // --- LLM FEATURES ---
        async function explainWithGemini(event) {
            event.stopPropagation(); // Prevent card from flipping back
            
            const card = shuffledFlashcards[fcIndex];
            const promptText = `You are an expert IT Ethics professor. Briefly explain this concept using a simple, real-world IT scenario or an analogy. Keep it under 3 sentences. Concept: ${card.question} - ${card.answer}`;

            const btn = document.getElementById('btn-explain');
            const container = document.getElementById('ai-explanation-container');
            
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Thinking...';
            btn.disabled = true;
            container.classList.remove('hidden');
            container.innerHTML = '<div class="animate-pulse text-indigo-200 text-center">Consulting AI...</div>';
            lucide.createIcons();

            try {
                const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptText }] }]
                    })
                });
                
                const text = response.candidates?.[0]?.content?.parts?.[0]?.text;
                container.innerHTML = `<strong class="text-white">✨ AI Insight:</strong><br/><span class="opacity-90 mt-1 block">${text}</span>`;
            } catch (e) {
                console.error("Explanation generation error:", e);
                
                if (e.message.includes("401") || e.message.includes("403")) {
                    showToast("Session Expired (401). Using a fallback explanation. Please refresh the page to restore your AI token.", false);
                    container.innerHTML = `<strong class="text-white">✨ AI Insight (Fallback):</strong><br/><span class="opacity-90 mt-1 block">This concept is like managing the locks on your house. You have the right to know who has a key and the power to change the locks if someone breaches your trust.</span>`;
                } else {
                    container.innerHTML = `<span class="text-red-300">Failed to load explanation.</span>`;
                    showToast("Failed to connect to the AI model. Please check your connection.");
                }
            } finally {
                btn.innerHTML = '✨ Explain Further';
                btn.disabled = false;
            }
        }

        async function generateMoreQuestions() {
            const btn = document.getElementById('btn-generate-quiz');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Generating...';
            btn.disabled = true;
            lucide.createIcons();

            // Randomize prompt focus to force variety
            const focusAreas = [
                "Philippine Data Privacy Act (RA 10173) rights and definitions", 
                "Intellectual Property Code (RA 8293) and Fair Use principles", 
                "Ethical Theories (Kantianism, Consequentialism, Relativism, etc.)", 
                "Computer Ethics and the Invisibility Factor", 
                "Notable Data Breaches and Security issues",
                "Patents vs Copyrights vs Trade Secrets",
                "Virtue Ethics, Care Ethics, and Existentialism"
            ];
            const shuffledTopics = focusAreas.sort(() => 0.5 - Math.random());
            const randomFocus = `${shuffledTopics[0]} and ${shuffledTopics[1]}`;

            // Provide context of existing questions to the AI so it knows what to avoid
            const existingQsText = quizData.map(q => q.q).join(" | ");
            const promptText = `Generate 3 new, advanced multiple choice questions specifically focusing on a mix of: ${randomFocus}. 
            CRITICAL: Ensure the questions are distinct and challenging. DO NOT duplicate or closely rephrase any of these existing concepts: ${existingQsText}`;

            try {
                const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptText }] }],
                        generationConfig: {
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: "OBJECT",
                                properties: {
                                    questions: {
                                        type: "ARRAY",
                                        items: {
                                            type: "OBJECT",
                                            properties: {
                                                q: {type: "STRING"},
                                                options: {
                                                    type: "ARRAY",
                                                    items: {type: "STRING"}
                                                },
                                                answer: {type: "INTEGER"}
                                            },
                                            required: ["q", "options", "answer"]
                                        }
                                    }
                                },
                                required: ["questions"]
                            }
                        }
                    })
                });
                
                let rawText = response.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!rawText) throw new Error("No text returned from API");
                
                // Clean the response
                rawText = rawText.replace(/```json/g, '').replace(/```/g, '').trim();
                
                const parsedData = JSON.parse(rawText);
                let newQuestions = parsedData.questions || parsedData;
                
                if (!Array.isArray(newQuestions) || newQuestions.length === 0) {
                    throw new Error("Invalid question format returned");
                }

                // Advanced Programmatic Deduplication: Use Fuzzy matching logic
                newQuestions = newQuestions.filter(nq => !isDuplicateQuestion(nq.q, quizData));

                if (newQuestions.length === 0) {
                    showToast("AI generated similar questions. Please click generate again for fresh ones.", true);
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    return;
                }
                
                // Add unique new questions and restart
                quizData = [...quizData, ...newQuestions];
                showToast(`Successfully added ${newQuestions.length} unique question(s) on ${randomFocus.split(' ')[0]}!`, false);
                startQuiz();

            } catch (e) {
                console.error("Quiz generation error:", e);
                
                if (e.message.includes("401") || e.message.includes("403")) {
                    const fallbackPool = [
                        { q: "[Fallback] Under the Data Privacy Act, who is required to appoint a Data Protection Officer (DPO)?", options: ["Only government agencies", "Only IT companies", "Personal Information Controllers and Processors", "Only companies with over 1000 employees"], answer: 2 },
                        { q: "[Fallback] Which of the following best describes 'Logical Malleability' in computer ethics?", options: ["Computers are prone to physical damage", "Computers can be programmed to do almost any logical task", "Software breaks easily under stress", "Hackers can easily steal data"], answer: 1 },
                        { q: "[Fallback] What is the primary difference between a Patent and a Copyright for software?", options: ["Patents protect the source code text; Copyrights protect the algorithm.", "Patents protect the underlying idea/method; Copyrights protect the exact expression.", "They are exactly the same in the Philippines.", "Software cannot be legally protected by either."], answer: 1 },
                        { q: "[Fallback] Which mode of acquiring ownership under the Civil Code specifically applies to programmers creating new software?", options: ["Occupation", "Tradition", "Intellectual Creation", "Prescription"], answer: 2 },
                        { q: "[Fallback] According to the 3 Levels of Computer Ethics, discussing a data breach on social media falls under:", options: ["POP (Popular)", "PARA (Analytical)", "THEORETICAL", "None of the above"], answer: 0 }
                    ];

                    // Deduplicate fallback questions using the fuzzy match logic
                    const uniqueFallbacks = fallbackPool.filter(fq => !isDuplicateQuestion(fq.q, quizData)).slice(0, 3);

                    if (uniqueFallbacks.length > 0) {
                        showToast("Session Expired (401). Using AI fallback questions. Refresh the page to restore your AI token.", false);
                        quizData = [...quizData, ...uniqueFallbacks];
                        startQuiz();
                    } else {
                        showToast("Session Expired (401). You have answered all offline questions. Please refresh.", true);
                        btn.innerHTML = originalText; 
                        btn.disabled = false; 
                    }
                } else {
                    btn.innerHTML = 'Failed. Try Again?';
                    showToast("Failed to generate questions. Please try again.");
                    setTimeout(() => { 
                        btn.innerHTML = originalText; 
                        btn.disabled = false; 
                    }, 3000);
                    return;
                }
            }
            
            btn.innerHTML = originalText;
            btn.disabled = false;
        }


        // --- MASSIVELY EXPANDED DATA POOLS ---
        let flashcardData = [
            // ETHICS BASICS & THEORIES
            { category: "Ethics Basics", question: "What is the origin of the word 'Ethics'?", answer: "Derived from the Greek word 'ethos' (custom/habit) and Latin 'mos, mores' (tradition). It includes cultural mannerisms, religion, politics, laws, and social aspirations." },
            { category: "Ethics Basics", question: "What is the exact meaning of Ethics?", answer: "It is the branch of knowledge that deals with moral principles. It is defined as the science of the morality of human acts, and the study of human motivation and behavior." },
            { category: "Ethics Basics", question: "What are the 3 Main Areas of Ethics?", answer: "1. <b>Meta-ethics</b> (explores the nature of morality itself)<br>2. <b>Normative ethics</b> (establishes rules/principles for behavior)<br>3. <b>Applied ethics</b> (applies theories to real-world issues)" },
            { category: "Ethical Theories", question: "What is Relativism?", answer: "The theory that there are no universal moral norms. Morality is relative. Includes Subjective Relativism (relative to individuals) and Cultural Relativism (relative to cultures)." },
            { category: "Ethical Theories", question: "How did Fred Dimasilip (1965) define Relativism?", answer: "He stated that different individuals or groups of people can have completely opposite views of a moral problem, and both can be right." },
            { category: "Ethical Theories", question: "Subjective vs Cultural Relativism", answer: "<b>Subjective:</b> Moral rightness depends entirely on the individual's approval.<br><b>Cultural:</b> Moral rightness depends entirely on what a specific culture or society deems appropriate." },
            { category: "Ethical Theories", question: "What is the Divine Command Theory?", answer: "Belief that an act is moral/immoral solely because God commands/prohibits it. It is based on obedience, not on reason." },
            { category: "Ethical Theories", question: "What is Ethical Egoism?", answer: "Morality is subjective. Self-interest is the origin of all morality, and acting against one's self-interest is considered immoral." },
            { category: "Ethical Theories", question: "Consequentialism vs Kantianism (Deontology)", answer: "<b>Consequentialism</b>: The end justifies the means (results matter most).<br><b>Kantianism</b>: Emphasizes the action itself, not the consequences. Act morally based on duty." },
            { category: "Ethical Theories", question: "Act vs Rule Utilitarianism", answer: "<b>Act Utilitarianism:</b> An action is good if its net effect produces more happiness than unhappiness.<br><b>Rule Utilitarianism:</b> Adopt moral rules which, if followed by everyone, lead to the greatest increase in total happiness." },
            { category: "Ethical Theories", question: "What is Kant's Categorical Imperative (1st Formulation)?", answer: "Act only from moral rules that you can at the same time will to be universal laws (i.e., would it be okay if everyone did it?)." },
            { category: "Ethical Theories", question: "What is Virtue Ethics?", answer: "Morality is about developing good character traits (like courage, honesty). A virtuous person will naturally make good decisions." },
            { category: "Ethical Theories", question: "What is Contractarianism (Social Contract Theory)?", answer: "Proposed by Hobbes and Rousseau. Morality arises from agreements or implicit contracts among people to form a stable, functioning society." },
            { category: "Ethical Theories", question: "What is Care Ethics (Feminist Ethics)?", answer: "Morality is about maintaining relationships and responding with care and empathy, rather than strictly following abstract rules." },
            { category: "Ethical Theories", question: "What is Existentialist Ethics?", answer: "Morality is completely subjective; individuals must take full responsibility to create their own values in an indifferent world." },
            { category: "Ethics Basics", question: "Law vs. Ethics: Which has stronger persuasive power?", answer: "The persuasive power of the <b>law</b> is much stronger compared to the persuasive power of ethics and morals, mostly due to strict enforcement and penalties." },

            // CODE OF ETHICS & COMPUTER ETHICS
            { category: "Code of Ethics", question: "What are the 2 Main Parts of a Code of Ethics?", answer: "1. Outlines what the organization aspires to become.<br>2. Lists specific rules and principles by which members are expected to abide." },
            { category: "Code of Ethics", question: "What are the 4 major Benefits of a Professional Code of Ethics?", answer: "1. Helps in Ethical Decision Making<br>2. Promotes High Standards of Practice<br>3. Builds Trust and Respect from the Public<br>4. Serves as an Evaluation Benchmark" },
            { category: "Code of Ethics", question: "Name the first 5 of the 'Ten Commandments of Computer Ethics'.", answer: "1. Don't use a computer to harm others.<br>2. Don't interfere with others' computer work.<br>3. Don't snoop in others' files.<br>4. Don't use a computer to steal.<br>5. Don't use a computer to bear false witness." },
            { category: "Code of Ethics", question: "Name the last 5 of the 'Ten Commandments of Computer Ethics'.", answer: "6. Don't copy proprietary software without paying.<br>7. Don't use others' resources without authorization.<br>8. Don't appropriate others' intellectual output.<br>9. Think about the social consequences of your program.<br>10. Use a computer in ways that ensure consideration and respect." },
            { category: "Computer Ethics", question: "What are the 3 main problems unique to Computer Ethics?", answer: "1. <b>Logical Malleability</b> (computers can do anything you program them to do)<br>2. <b>Impact on Society</b> (changing the nature of workplaces and social interactions)<br>3. <b>Invisibility Factor</b>" },
            { category: "Computer Ethics", question: "Explain the 'Invisibility Factor' in IT Ethics.", answer: "Computer operations occur invisibly, leading to:<br>1. Invisible Abuse (e.g., hidden tracking)<br>2. Invisible Programming Values (biases in code)<br>3. Invisible Complex Calculations (black-box AI algorithms)." },
            { category: "Computer Ethics", question: "What are the 3 Levels of Computer Ethics?", answer: "1. <b>POP</b> (Public discussion, news, awareness)<br>2. <b>PARA</b> (Analytical interest without formal ethical authority or training)<br>3. <b>THEORETICAL</b> (Trained in philosophy/Ethical Theory)" },
            { category: "Computer Ethics", question: "What is the 3-Step Strategy for solving Computer Ethics Issues?", answer: "Step 1: Identify a controversial practice.<br>Step 2: Analyze the ethical issue (clarify concepts, facts, and stakeholders).<br>Step 3: Deliberate on the ethical issue to reach a conclusion." },
            
            // PRIVACY & DATA BREACHES
            { category: "Privacy", question: "What are the 3 Views on Privacy?", answer: "1. <b>Accessibility privacy:</b> Freedom from unwarranted intrusion (physical space).<br>2. <b>Decisional privacy:</b> Freedom from interference in personal choices.<br>3. <b>Informational privacy:</b> Control over the flow of one's personal information." },
            { category: "Privacy", question: "What are the 4 Torts of Privacy Invasion?", answer: "1. Intrusion upon seclusion<br>2. Public disclosure of embarrassing private facts<br>3. False light (misleading public portrayal)<br>4. Appropriation of name or likeness for commercial gain" },
            { category: "Privacy", question: "What is the Constitutional Provision on Privacy in the Philippines?", answer: "Article III, Section 3: The privacy of communication and correspondence shall be inviolable except upon lawful order of the court, or when public safety or order requires otherwise." },
            { category: "Privacy", question: "What is the legal definition of Due Process?", answer: "A law which hears before it condemns; proceeds upon inquiry, and renders judgment only after a fair trial or hearing." },
            { category: "Data Breaches", question: "What happened in the 2016 COMELEC Data Breach?", answer: "Also known as 'Comeleak', 70 million registered voters lost fingerprint data, email addresses, and personal info to hackers right before the national elections." },
            { category: "Data Breaches", question: "Describe 3 other notable Philippine Data Breaches.", answer: "1. <b>Wendy's PH (2017)</b> - 82k records stolen.<br>2. <b>Cebuana Lhuillier (2019)</b> - 900k clients' data exposed.<br>3. <b>UCPB (2020)</b> - P167M stolen via ATM and online banking.<br>4. <b>PhilHealth Medusa (2023)</b> - Massive ransomware leak." },
            { category: "Data Privacy", question: "Identity Theft vs Phishing", answer: "<b>Identity theft</b>: Fraudulently using another person's information to obtain goods or services.<br><b>Phishing</b>: A high-tech scam (often emails/popups) designed to deceive people into disclosing sensitive info." },

            // DATA PRIVACY ACT (RA 10173)
            { category: "Data Privacy Act", question: "What is RA 10173?", answer: "The Data Privacy Act of 2012. It regulates the processing of personal information by public and private entities to protect an individual's right to privacy." },
            { category: "Data Privacy Act", question: "Does RA 10173 apply outside the Philippines? (Extraterritoriality)", answer: "<b>Yes</b>, if foreign entities process the personal data of Filipino citizens or residents, or if their processing equipment is located within the Philippines." },
            { category: "Data Privacy Act", question: "What is the composition of the National Privacy Commission (NPC)?", answer: "The NPC is attached to the DICT and is composed of one (1) Privacy Commissioner serving as Chairman, and two (2) Deputy Privacy Commissioners." },
            { category: "Data Privacy Act", question: "What are the Functions of the National Privacy Commission (NPC)?", answer: "Rule Making, Advisory, Public Education, Compliance/Monitoring, Complaints/Investigations, and Enforcement of data privacy rules." },
            { category: "Data Privacy Act", question: "Define 'Processing' under RA 10173.", answer: "Any operation or set of operations performed upon personal info, including collection, recording, organization, storage, updating, modification, retrieval, use, erasure, or destruction." },
            { category: "Data Privacy Act", question: "PIC vs PIP", answer: "<b>PIC (Personal Information Controller):</b> Controls the collection or processing of personal data.<br><b>PIP (Personal Information Processor):</b> An outsourced entity processing data solely on behalf of a PIC." },
            { category: "Data Privacy Act", question: "What exactly is Sensitive Personal Information?", answer: "Includes race, ethnic origin, marital status, age, religion, political affiliations, health/medical records, genetics, sexual life, criminal offenses, SSN, and tax returns." },
            { category: "Data Privacy Act", question: "What is Privileged Information?", answer: "Highly confidential data protected by the Rules of Court and law, such as information shared between a client and their lawyer, or a patient and their doctor." },
            { category: "Data Privacy Act", question: "Name the 7 Rights of the Data Subject.", answer: "1. Right to be Informed<br>2. Right to Object<br>3. Right to Access<br>4. Right to Rectification (Correct)<br>5. Right to Erasure/Blocking<br>6. Right to Data Portability<br>7. Right to Damages" },
            { category: "Data Privacy Act", question: "Explain the Right to Erasure or Blocking.", answer: "The right to suspend, withdraw, or order the destruction of personal data. It is CONDITIONAL (e.g., applicable only if data is false, unlawfully obtained, or no longer necessary for its original purpose)." },
            { category: "Data Privacy Act", question: "What are the 3 Core Principles of Data Privacy?", answer: "1. <b>Transparency</b>: Data subjects must know how their data is used.<br>2. <b>Legitimate Purpose</b>: Data must be processed for lawful reasons only.<br>3. <b>Proportionality</b>: Processing must be adequate and not excessive in relation to the purpose." },
            { category: "Data Privacy Act", question: "What are the main Responsibilities of Organizations regarding Data Privacy?", answer: "They must obtain valid consent, implement strict security measures, quickly notify the NPC and individuals of data breaches, and formally appoint a Data Protection Officer (DPO)." },
            
            // INTELLECTUAL PROPERTY
            { category: "Intellectual Property", question: "What is RA 8293?", answer: "The Intellectual Property Code of the Philippines. It protects the exclusive rights of scientists, inventors, artists, and programmers to their creations." },
            { category: "Intellectual Property", question: "What is the State Policy regarding Intellectual Property in the PH?", answer: "It is vital to domestic development, facilitates tech transfer, attracts foreign investments, and ensures market access. Critically, the use of IP bears a <b>social function</b>." },
            { category: "Intellectual Property", question: "Name the 7 Modes of Acquiring Ownership under the Civil Code.", answer: "1. Occupation<br>2. Law<br>3. Donation<br>4. Tradition<br>5. Intellectual Creation<br>6. Prescription<br>7. Succession" },
            { category: "Intellectual Property", question: "What is the 'First to File Rule'?", answer: "If two or more persons independently made the exact same invention separately, the patent right belongs to the person who filed the application earliest." },
            { category: "Intellectual Property", question: "What is the legal duration of Patents, Trademarks, and Copyrights?", answer: "<b>Patents</b>: 20 years from filing date.<br><b>Trademarks</b>: 10 years (renewable).<br><b>Copyrights</b>: Lifetime of the author plus 50 years after their death." },
            { category: "Intellectual Property", question: "Patents vs Trademarks vs Copyrights (Definitions)", answer: "<b>Patents</b>: Protects new, non-obvious inventions.<br><b>Trademarks</b>: Brand names/logos indicating the source of goods.<br><b>Copyrights</b>: Protects original works of authorship (books, software, art) from the moment of creation." },
            { category: "Intellectual Property", question: "Are Computer Programs patentable in the Philippines?", answer: "<b>NO.</b> Section 22 explicitly excludes schemes, rules, mental acts, doing business, and programs for computers from patent protection." },
            { category: "Intellectual Property", question: "How exactly are Computer Programs legally protected?", answer: "Under <b>Copyrights</b> as literary and artistic works, automatically protected from the very moment of their creation." },
            { category: "Intellectual Property", question: "Who owns the copyright if a work is of 'Joint Authorship'?", answer: "The co-authors are original owners. If parts can be used separately, the author of each specific part owns the copyright to their distinct part." },
            { category: "Intellectual Property", question: "Who owns the copyright for software made during employment?", answer: "The <b>Employer</b> if it's part of the employee's regular duties. The <b>Employee</b> if it's outside regular duties (even if they used the employer's time or facilities)." },
            { category: "Intellectual Property", question: "Is it legal to reproduce a copyrighted computer program?", answer: "The IPC specifically allows the lawful owner to make exactly <b>ONE (1) back-up copy</b> for conjunction with a computer or for archival/replacement purposes." },
            { category: "Intellectual Property", question: "What is a Trade Secret?", answer: "A plan, process, tool, or compilation of information known only to its owner and employees, which gives the business a competitive advantage over competitors." },
            { category: "Intellectual Property", question: "What is Decompilation?", answer: "Translating machine code back into source code to achieve inter-operability with other programs. Under certain strict conditions, it may constitute <b>Fair Use</b>." },
            { category: "Intellectual Property", question: "What 4 factors determine 'Fair Use'?", answer: "1. Purpose and character of use (educational vs commercial)<br>2. Nature of the copyrighted work<br>3. Amount and substantiality of the portion used<br>4. Effect of the use upon the potential market value" },
            { category: "Intellectual Property", question: "Provide an example of Fair Use Analysis.", answer: "<b>Scenario:</b> A student quotes a book in a paper.<br>Educational purpose, academic nature of work, minimal amount used, and it doesn't harm book sales = <b>Fair Use</b>." },
            { category: "Intellectual Property", question: "What is the exact difference between Plagiarism and Copyright Infringement?", answer: "<b>Plagiarism</b> is an ETHICAL violation (taking credit for someone else's ideas/authorship).<br><b>Infringement</b> is a LEGAL violation (copying, reproducing, or distributing a protected work without permission from the copyright owner)." }
        ];

        let quizData = [];
        
        function initRandomQuizData() {
            // Pick 10 completely random questions from the massively expanded master pool on load
            const shuffledPool = [...masterQuizPool].sort(() => 0.5 - Math.random());
            quizData = shuffledPool.slice(0, 10);
        }
        initRandomQuizData();

        // --- APP STATE ---
        let currentMode = 'flashcards'; // 'flashcards' or 'quiz'
        
        // Flashcard State
        let fcIndex = 0;
        let isFlipped = false;
        let shuffledFlashcards = [...flashcardData];

        // Quiz State
        let qIndex = 0;
        let qScore = 0;
        let qActive = false;
        let shuffledQuiz = [];

        // Initialize Icons
        lucide.createIcons();

        // --- MODE SWITCHING ---
        function switchMode(mode) {
            currentMode = mode;
            
            // Update Tab UI
            const tabFc = document.getElementById('tab-flashcards');
            const tabQz = document.getElementById('tab-quiz');
            
            if(mode === 'flashcards') {
                tabFc.className = "flex items-center gap-2 px-4 py-1.5 rounded-lg text-sm font-semibold transition-all bg-white text-indigo-700 shadow-sm";
                tabQz.className = "flex items-center gap-2 px-4 py-1.5 rounded-lg text-sm font-semibold transition-all text-slate-500 hover:text-slate-700";
                
                document.getElementById('mode-flashcards').classList.remove('hidden');
                document.getElementById('mode-quiz').classList.add('hidden');
                renderFlashcard();
            } else {
                tabQz.className = "flex items-center gap-2 px-4 py-1.5 rounded-lg text-sm font-semibold transition-all bg-white text-indigo-700 shadow-sm";
                tabFc.className = "flex items-center gap-2 px-4 py-1.5 rounded-lg text-sm font-semibold transition-all text-slate-500 hover:text-slate-700";
                
                document.getElementById('mode-quiz').classList.remove('hidden');
                document.getElementById('mode-flashcards').classList.add('hidden');
                if(!qActive) startQuiz();
            }
        }

        // --- FLASHCARD LOGIC ---
        const elFcContainer = document.getElementById('flashcard-inner');

        function renderFlashcard() {
            const card = shuffledFlashcards[fcIndex];
            
            if (isFlipped) {
                isFlipped = false;
                elFcContainer.classList.remove('rotate-y-180');
                setTimeout(() => updateFcDOM(card), 300);
            } else {
                updateFcDOM(card);
            }
        }

        function updateFcDOM(card) {
            document.getElementById('fc-question').innerHTML = card.question;
            document.getElementById('fc-answer').innerHTML = card.answer;
            document.getElementById('fc-category').innerText = card.category;
            
            // Reset AI explanation container when moving to a new card
            const aiContainer = document.getElementById('ai-explanation-container');
            aiContainer.innerHTML = '';
            aiContainer.classList.add('hidden');

            const num = fcIndex + 1;
            const total = shuffledFlashcards.length;
            document.getElementById('fc-progress-text').innerText = `${num} / ${total}`;
            document.getElementById('fc-progress-bar').style.width = `${(num / total) * 100}%`;
        }

        function flipCard() {
            if(currentMode !== 'flashcards') return;
            isFlipped = !isFlipped;
            isFlipped ? elFcContainer.classList.add('rotate-y-180') : elFcContainer.classList.remove('rotate-y-180');
        }

        function nextCard() {
            fcIndex = (fcIndex < shuffledFlashcards.length - 1) ? fcIndex + 1 : 0;
            renderFlashcard();
        }

        function prevCard() {
            fcIndex = (fcIndex > 0) ? fcIndex - 1 : shuffledFlashcards.length - 1;
            renderFlashcard();
        }

        function shuffleCards() {
            shuffledFlashcards = shuffledFlashcards.sort(() => 0.5 - Math.random());
            fcIndex = 0;
            renderFlashcard();
            
            const btn = document.querySelector('button[title="Shuffle Cards"]');
            btn.classList.add('bg-indigo-100');
            setTimeout(() => btn.classList.remove('bg-indigo-100'), 300);
        }

        // --- QUIZ LOGIC ---
        function startQuiz() {
            qActive = true;
            qScore = 0;
            qIndex = 0;
            
            // Deep copy, shuffle options, update correct answer index, then shuffle questions
            shuffledQuiz = quizData.map(q => {
                const correctAnswerText = q.options[q.answer];
                let newOptions = [...q.options].sort(() => 0.5 - Math.random());
                
                return {
                    ...q,
                    options: newOptions,
                    answer: newOptions.indexOf(correctAnswerText)
                };
            }).sort(() => 0.5 - Math.random());
            
            document.getElementById('quiz-results').classList.add('hidden');
            document.getElementById('quiz-active').classList.remove('hidden');
            document.getElementById('quiz-total-num').innerText = shuffledQuiz.length;
            
            renderQuizQuestion();
        }

        function renderQuizQuestion() {
            document.getElementById('quiz-next-btn').classList.add('hidden');
            
            const q = shuffledQuiz[qIndex];
            document.getElementById('quiz-current-num').innerText = qIndex + 1;
            document.getElementById('quiz-score').innerText = qScore;
            document.getElementById('quiz-progress-bar').style.width = `${((qIndex) / shuffledQuiz.length) * 100}%`;
            
            document.getElementById('quiz-question').innerHTML = q.q;
            
            const optionsContainer = document.getElementById('quiz-options');
            optionsContainer.innerHTML = '';
            
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = "quiz-option w-full text-left p-4 rounded-xl border-2 border-slate-200 text-slate-700 font-medium bg-white outline-none flex items-center justify-between";
                btn.innerHTML = `<span>${opt}</span> <i data-lucide="circle" class="w-5 h-5 text-slate-300 icon-placeholder"></i>`;
                btn.onclick = () => handleQuizAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });
            lucide.createIcons();
        }

        function handleQuizAnswer(selectedIndex, btnElement) {
            const q = shuffledQuiz[qIndex];
            const isCorrect = (selectedIndex === q.answer);
            
            // Disable all buttons
            const buttons = document.querySelectorAll('.quiz-option');
            buttons.forEach((btn, idx) => {
                btn.disabled = true;
                btn.classList.add('cursor-not-allowed', 'opacity-80');
                
                const icon = btn.querySelector('.icon-placeholder');
                
                if(idx === q.answer) {
                    btn.classList.add('correct');
                    icon.setAttribute('data-lucide', 'check-circle-2');
                    icon.classList.replace('text-slate-300', 'text-green-600');
                } else if (idx === selectedIndex && !isCorrect) {
                    btn.classList.add('wrong');
                    icon.setAttribute('data-lucide', 'x-circle');
                    icon.classList.replace('text-slate-300', 'text-red-600');
                }
            });
            lucide.createIcons(); // Re-render updated icons

            if(isCorrect) qScore++;
            document.getElementById('quiz-score').innerText = qScore;
            
            // Show Next button
            const nextBtn = document.getElementById('quiz-next-btn');
            nextBtn.classList.remove('hidden');
            nextBtn.innerText = (qIndex === shuffledQuiz.length - 1) ? "View Results" : "Next Question";
            nextBtn.innerHTML += ' <i data-lucide="arrow-right" class="w-5 h-5"></i>';
            lucide.createIcons();
        }

        function nextQuizQuestion() {
            qIndex++;
            if(qIndex >= shuffledQuiz.length) {
                endQuiz();
            } else {
                renderQuizQuestion();
            }
        }

        function endQuiz() {
            qActive = false;
            document.getElementById('quiz-active').classList.add('hidden');
            const results = document.getElementById('quiz-results');
            results.classList.remove('hidden');
            
            document.getElementById('quiz-final-score').innerText = `${qScore}/${shuffledQuiz.length}`;
            
            const percentage = qScore / shuffledQuiz.length;
            const feedbackEl = document.getElementById('quiz-feedback');
            
            if(percentage === 1) { feedbackEl.innerText = "Perfect Score! Master!"; feedbackEl.className = "text-sm font-bold text-green-500 uppercase tracking-wider mb-8"; }
            else if(percentage >= 0.7) { feedbackEl.innerText = "Great Job!"; feedbackEl.className = "text-sm font-bold text-indigo-500 uppercase tracking-wider mb-8"; }
            else if(percentage >= 0.5) { feedbackEl.innerText = "Good Effort! Keep Reviewing."; feedbackEl.className = "text-sm font-bold text-orange-500 uppercase tracking-wider mb-8"; }
            else { feedbackEl.innerText = "Needs Practice. Back to Flashcards!"; feedbackEl.className = "text-sm font-bold text-red-500 uppercase tracking-wider mb-8"; }
        }

        // --- GLOBAL EVENT LISTENERS ---
        document.addEventListener('keydown', (e) => {
            if (currentMode === 'flashcards') {
                if (e.code === 'Space') { e.preventDefault(); flipCard(); }
                else if (e.code === 'ArrowRight') { nextCard(); }
                else if (e.code === 'ArrowLeft') { prevCard(); }
            }
        });

        // Touch swipe for flashcards
        let touchStartX = 0;
        document.getElementById('mode-flashcards').addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, {passive: true});
        document.getElementById('mode-flashcards').addEventListener('touchend', e => {
            let touchEndX = e.changedTouches[0].screenX;
            if (touchEndX < touchStartX - 50) nextCard();
            if (touchEndX > touchStartX + 50) prevCard();
        }, {passive: true});

        // Initialize App
        renderFlashcard();

    </script>
</body>
</html>
