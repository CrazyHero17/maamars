<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* 3D Flip Card Styles */
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { 
            backface-visibility: hidden; 
            -webkit-backface-visibility: hidden; 
        }
        .rotate-y-180 { transform: rotateY(180deg); }
        .flip-transition { transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); }
        
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.02); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }

        /* Animations */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Quiz Option Button Styles */
        .quiz-option {
            transition: all 0.2s ease;
        }
        .quiz-option:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .quiz-option:active:not(:disabled) {
            transform: translateY(0);
        }
        .quiz-option.correct {
            background-color: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
        }
        .quiz-option.wrong {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
        }
    </style>
</head>

    <script>
        // --- GEMINI API CONFIG ---
        const apiKey = ""; 

        // Unified Toast Error display
        function showToast(message, isError = true) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-xl shadow-lg text-sm font-medium fade-in flex items-center gap-3 ${isError ? 'bg-red-600 text-white' : 'bg-emerald-600 text-white'}`;
            toast.innerHTML = `<i data-lucide="${isError ? 'alert-triangle' : 'check-circle'}" class="w-5 h-5"></i> <span>${message}</span>`;
            
            container.appendChild(toast);
            lucide.createIcons();

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(10px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 5000);
        }

        async function fetchWithRetry(url, options, retries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        // Immediately throw auth errors without retrying and delaying
                        if (response.status === 401 || response.status === 403) {
                            throw new Error(`HTTP error! status: ${response.status}`);
                        }
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return await response.json();
                } catch (error) {
                    if (error.message.includes('401') || error.message.includes('403') || i === retries - 1) {
                        throw error;
                    }
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        }

        // --- LLM FEATURES ---
        async function explainWithGemini(event) {
            event.stopPropagation(); // Prevent card from flipping back
            
            const card = shuffledFlashcards[fcIndex];
            const promptText = `You are an expert IT Ethics professor. Briefly explain this concept using a simple, real-world IT scenario or an analogy. Keep it under 3 sentences. Concept: ${card.question} - ${card.answer}`;

            const btn = document.getElementById('btn-explain');
            const container = document.getElementById('ai-explanation-container');
            
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Thinking...';
            btn.disabled = true;
            container.classList.remove('hidden');
            container.innerHTML = '<div class="animate-pulse text-indigo-200 text-center">Consulting AI...</div>';
            lucide.createIcons();

            try {
                const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptText }] }]
                    })
                });
                
                const text = response.candidates?.[0]?.content?.parts?.[0]?.text;
                container.innerHTML = `<strong class="text-white">✨ AI Insight:</strong><br/><span class="opacity-90 mt-1 block">${text}</span>`;
            } catch (e) {
                console.error("Explanation generation error:", e);
                
                if (e.message.includes("401") || e.message.includes("403")) {
                    showToast("Session Expired (401). Using a fallback explanation. Please refresh the page to restore your AI token.", false);
                    container.innerHTML = `<strong class="text-white">✨ AI Insight (Fallback):</strong><br/><span class="opacity-90 mt-1 block">This concept is like managing the locks on your house. You have the right to know who has a key and the power to change the locks if someone breaches your trust.</span>`;
                } else {
                    container.innerHTML = `<span class="text-red-300">Failed to load explanation.</span>`;
                    showToast("Failed to connect to the AI model. Please check your connection.");
                }
            } finally {
                btn.innerHTML = '✨ Explain Further';
                btn.disabled = false;
            }
        }

        async function generateMoreQuestions() {
            const btn = document.getElementById('btn-generate-quiz');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Generating...';
            btn.disabled = true;
            lucide.createIcons();

            // Provide context of existing questions to the AI so it knows what to avoid
            const existingQsText = quizData.map(q => q.q).join(" | ");
            const promptText = `Generate 3 new, advanced multiple choice questions about IT Ethics, Intellectual Property (like patents and copyrights), and the Data Privacy Act. 
            CRITICAL: Ensure the questions are distinct and challenging. DO NOT duplicate or closely rephrase any of these existing questions: ${existingQsText}`;

            try {
                const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptText }] }],
                        generationConfig: {
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: "OBJECT",
                                properties: {
                                    questions: {
                                        type: "ARRAY",
                                        items: {
                                            type: "OBJECT",
                                            properties: {
                                                q: {type: "STRING"},
                                                options: {
                                                    type: "ARRAY",
                                                    items: {type: "STRING"}
                                                },
                                                answer: {type: "INTEGER"}
                                            },
                                            required: ["q", "options", "answer"]
                                        }
                                    }
                                },
                                required: ["questions"]
                            }
                        }
                    })
                });
                
                let rawText = response.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!rawText) throw new Error("No text returned from API");
                
                // Clean the response
                rawText = rawText.replace(/```json/g, '').replace(/```/g, '').trim();
                
                const parsedData = JSON.parse(rawText);
                let newQuestions = parsedData.questions || parsedData;
                
                if (!Array.isArray(newQuestions) || newQuestions.length === 0) {
                    throw new Error("Invalid question format returned");
                }

                // Programmatic Deduplication: Double check that no exact matches slip through
                const existingQuestionSet = new Set(quizData.map(item => item.q.toLowerCase().trim()));
                newQuestions = newQuestions.filter(nq => !existingQuestionSet.has(nq.q.toLowerCase().trim()));

                if (newQuestions.length === 0) {
                    showToast("AI generated duplicate questions. Please try again.", true);
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    return;
                }
                
                // Add unique new questions and restart
                quizData = [...quizData, ...newQuestions];
                showToast(`Successfully added ${newQuestions.length} unique question(s)!`, false);
                startQuiz();

            } catch (e) {
                console.error("Quiz generation error:", e);
                
                if (e.message.includes("401") || e.message.includes("403")) {
                    const fallbackQuestions = [
                        { q: "[Fallback Generated] Under the Data Privacy Act, who is required to appoint a Data Protection Officer (DPO)?", options: ["Only government agencies", "Only IT companies", "Personal Information Controllers and Processors", "Only companies with over 1000 employees"], answer: 2 },
                        { q: "[Fallback Generated] Which of the following best describes 'Logical Malleability' in computer ethics?", options: ["Computers are prone to physical damage", "Computers can be programmed to do almost any logical task", "Software breaks easily under stress", "Hackers can easily steal data"], answer: 1 },
                        { q: "[Fallback Generated] What is the primary difference between a Patent and a Copyright for software?", options: ["Patents protect the source code text; Copyrights protect the algorithm.", "Patents protect the underlying idea/method; Copyrights protect the exact expression.", "They are exactly the same in the Philippines.", "Software cannot be legally protected by either."], answer: 1 }
                    ];

                    // Also deduplicate fallback questions!
                    const existingQuestionSet = new Set(quizData.map(item => item.q.toLowerCase().trim()));
                    const uniqueFallbacks = fallbackQuestions.filter(fq => !existingQuestionSet.has(fq.q.toLowerCase().trim()));

                    if (uniqueFallbacks.length > 0) {
                        showToast("Session Expired (401). Using AI fallback questions. Refresh the page to restore your AI token.", false);
                        quizData = [...quizData, ...uniqueFallbacks];
                        startQuiz();
                    } else {
                        showToast("Session Expired (401). No more unique fallback questions available. Please refresh.", true);
                        btn.innerHTML = originalText; 
                        btn.disabled = false; 
                    }
                } else {
                    btn.innerHTML = 'Failed. Try Again?';
                    showToast("Failed to generate questions. Please try again.");
                    setTimeout(() => { 
                        btn.innerHTML = originalText; 
                        btn.disabled = false; 
                    }, 3000);
                    return;
                }
            }
            
            btn.innerHTML = originalText;
            btn.disabled = false;
        }


        // --- DATA ---
        let flashcardData = [
            // ETHICS BASICS & THEORIES
            { category: "Ethics Basics", question: "What is the origin of the word 'Ethics'?", answer: "Derived from the Greek word 'ethos' (custom/habit) and Latin 'mos, mores' (tradition)." },
            { category: "Ethics Basics", question: "What are the 3 Main Areas of Ethics?", answer: "1. Meta-ethics (nature of morality)<br>2. Normative ethics (rules/principles)<br>3. Applied ethics (real-world issues)" },
            { category: "Ethical Theories", question: "What is Relativism?", answer: "The theory that there are no universal moral norms. Includes Subjective (individuals) and Cultural (cultures) relativism." },
            { category: "Ethical Theories", question: "What is the Divine Command Theory?", answer: "Belief that an act is moral/immoral solely because God commands/prohibits it. Based on obedience, not reason." },
            { category: "Ethical Theories", question: "What is Ethical Egoism?", answer: "Morality is subjective. Self-interest is the origin of all morality, and acting against one's self-interest is immoral." },
            { category: "Ethical Theories", question: "Consequentialism vs Kantianism (Deontology)", answer: "<b>Consequentialism</b>: End justifies the means (results matter).<br><b>Kantianism</b>: Act morally regardless of consequences (duty-based)." },
            { category: "Ethical Theories", question: "What is Virtue Ethics?", answer: "Morality is about developing good character traits (courage, honesty). A virtuous person naturally makes good decisions." },
            { category: "Ethical Theories", question: "What is Contractarianism (Social Contract Theory)?", answer: "Morality arises from agreements or implicit contracts among people to form a stable society." },
            { category: "Ethical Theories", question: "What is Care Ethics (Feminist Ethics)?", answer: "Morality is about maintaining relationships and responding with care and empathy rather than strict rules." },
            { category: "Ethical Theories", question: "What is Existentialist Ethics?", answer: "Morality is subjective; individuals must create their own values in an absurd or indifferent world." },
            { category: "Ethics Basics", question: "Law vs. Ethics: Which has stronger persuasive power?", answer: "The persuasive power of the law is much stronger compared to the persuasive power of ethics and morals." },

            // CODE OF ETHICS & COMPUTER ETHICS
            { category: "Code of Ethics", question: "What are the 2 Main Parts of a Code of Ethics?", answer: "1. Outlines what the organization aspires to become.<br>2. Lists rules and principles by which members are expected to abide." },
            { category: "Code of Ethics", question: "What are the Benefits of a Professional Code of Ethics?", answer: "1. Ethical Decision Making<br>2. High Standards of Practice<br>3. Trust and Respect from the Public<br>4. Evaluation Benchmark" },
            { category: "Code of Ethics", question: "Name at least 3 of the 'Ten Commandments of Computer Ethics'.", answer: "1. Do not use a computer to harm others.<br>2. Do not snoop in others' files.<br>3. Do not use a computer to steal.<br>4. Think about the social consequences of the program you write." },
            { category: "Computer Ethics", question: "What are the 3 main problems in Computer Ethics?", answer: "1. Logical Malleability (computers can be molded to do anything)<br>2. Impact on Society (changing workplace)<br>3. Invisibility Factor" },
            { category: "Computer Ethics", question: "What is the 'Invisibility Factor'?", answer: "Computer operations are invisible, leading to:<br>1. Invisible Abuse<br>2. Invisible Programming Values<br>3. Invisible Complex Calculations." },
            { category: "Computer Ethics", question: "What are the 3 Levels of Computer Ethics?", answer: "1. <b>POP</b> (Public Discussion/News)<br>2. <b>PARA</b> (Analytical interest without formal authority)<br>3. <b>THEORETICAL</b> (Trained in Ethical Theory)" },
            { category: "Computer Ethics", question: "What is the 3-Step Strategy for Computer Ethics Issues?", answer: "Step 1: Identify a controversial practice.<br>Step 2: Analyze the ethical issue (clarify concepts).<br>Step 3: Deliberate on the ethical issue." },
            
            // PRIVACY & DATA BREACHES
            { category: "Privacy", question: "What are the 3 Views on Privacy?", answer: "1. <b>Accessibility</b> (physical space)<br>2. <b>Decisional</b> (freedom in choices)<br>3. <b>Informational</b> (personal data control)" },
            { category: "Privacy", question: "What is the Constitutional Provision on Privacy in the Philippines?", answer: "Article III, Section 3: The privacy of communication and correspondence shall be inviolable except upon lawful order of the court." },
            { category: "Privacy", question: "What is Due Process?", answer: "A law which hears before it condemns; proceeds upon inquiry, and renders judgment only after trial." },
            { category: "Data Breaches", question: "What happened in the 2016 COMELEC Data Breach?", answer: "70 million registered voters lost fingerprint data, email addresses, and personal info to hackers right before the national elections." },
            { category: "Data Breaches", question: "Name 3 other notable Philippine Data Breaches.", answer: "1. Wendy's PH (2017) - 82k records stolen.<br>2. Cebuana Lhuillier (2019) - 900k clients' data stolen.<br>3. UCPB (2020) - P167M stolen via ATM/online.<br>4. PhilHealth Medusa (2023)" },
            { category: "Data Privacy", question: "Identity Theft vs Phishing", answer: "<b>Identity theft</b>: Using another's info for fraud.<br><b>Phishing</b>: Scam (emails/popups) to deceive people into disclosing sensitive info." },

            // DATA PRIVACY ACT (RA 10173)
            { category: "Data Privacy Act", question: "What is RA 10173?", answer: "The Data Privacy Act of 2012. Protects personal info processing by public/private entities." },
            { category: "Data Privacy Act", question: "Does RA 10173 apply outside the Philippines? (Extraterritorial)", answer: "<b>Yes</b>, if they process personal data of Filipino citizens/residents or if the processing equipment is in the Philippines." },
            { category: "Data Privacy Act", question: "What are the Functions of the National Privacy Commission (NPC)?", answer: "Rule Making, Advisory, Public Education, Compliance/Monitoring, Complaints/Investigations, and Enforcement." },
            { category: "Data Privacy Act", question: "Define 'Processing' under RA 10173.", answer: "Any operation performed upon personal info (collection, recording, storage, updating, retrieval, use, erasure, destruction)." },
            { category: "Data Privacy Act", question: "PIC vs PIP", answer: "<b>PIC (Controller)</b>: Controls collection/processing of data.<br><b>PIP (Processor)</b>: Outsourced entity processing data for a PIC." },
            { category: "Data Privacy Act", question: "Examples of Sensitive Personal Information", answer: "Race, marital status, age, religion, health, genetics, sexual life, offenses, SSN, tax returns." },
            { category: "Data Privacy Act", question: "What is Privileged Information?", answer: "Confidential data protected by the Rules of Court and law (e.g., Information given by a client to their lawyer)." },
            { category: "Data Privacy Act", question: "Name the 7 Rights of the Data Subject.", answer: "1. Right to be Informed<br>2. Right to Object<br>3. Right to Access<br>4. Right to Rectification/Correct<br>5. Right to Erasure/Blocking<br>6. Right to Data Portability<br>7. Right to Damages" },
            { category: "Data Privacy Act", question: "What is the Right to Erasure or Blocking?", answer: "Right to suspend, withdraw, or destroy personal data. It is CONDITIONAL (e.g., if data is false, unlawfully obtained, or outdated)." },
            { category: "Data Privacy Act", question: "What are the Core Principles of Data Privacy?", answer: "1. <b>Transparency</b>: Individuals must know how data is used.<br>2. <b>Legitimate Purpose</b>: Data processed for lawful reasons.<br>3. <b>Proportionality</b>: Processing must not be excessive." },
            { category: "Data Privacy Act", question: "What are the Responsibilities of Organizations?", answer: "Obtain valid consent, implement security measures, notify NPC and individuals of breaches, and appoint a Data Protection Officer (DPO)." },
            
            // INTELLECTUAL PROPERTY
            { category: "Intellectual Property", question: "What is RA 8293?", answer: "Intellectual Property Code of the Philippines. Protects exclusive rights of scientists, inventors, artists, and programmers." },
            { category: "Intellectual Property", question: "What is the State Policy regarding Intellectual Property?", answer: "It is vital to domestic development, facilitates technology transfer, attracts foreign investments, and ensures market access. It bears a <b>social function</b>." },
            { category: "Intellectual Property", question: "Name 4 Modes of Acquiring Ownership under the Civil Code.", answer: "1. Occupation<br>2. Law<br>3. Donation<br>4. Tradition<br>5. Intellectual Creation<br>6. Prescription<br>7. Succession" },
            { category: "Intellectual Property", question: "What is the 'First to File Rule'?", answer: "If two or more persons made an invention separately, the patent goes to the person who filed the application earliest." },
            { category: "Intellectual Property", question: "Patents vs Trademarks vs Copyrights", answer: "<b>Patents</b>: New inventions.<br><b>Trademarks</b>: Brand names/logos.<br><b>Copyrights</b>: Works of authorship (books, software, art)." },
            { category: "Intellectual Property", question: "Are Computer Programs patentable?", answer: "<b>NO.</b> Section 22 excludes schemes, rules, mental acts, and programs for computers from patent protection." },
            { category: "Intellectual Property", question: "How are Computer Programs protected?", answer: "Under <b>Copyrights</b> as literary/artistic works, from the very moment of their creation." },
            { category: "Intellectual Property", question: "Who owns the copyright if a work is of 'Joint Authorship'?", answer: "The co-authors are original owners. If parts can be used separately, the author of each part owns the copyright to their specific part." },
            { category: "Intellectual Property", question: "Who owns the copyright for work made during employment?", answer: "The <b>Employer</b> if it's part of regular duties. The <b>Employee</b> if it's outside regular duties (even if using employer's time/facilities)." },
            { category: "Intellectual Property", question: "Is it legal to reproduce a copyrighted computer program?", answer: "The IPC allows the lawful owner ONE (1) back-up copy for conjunction with a computer or for archival/replacement purposes." },
            { category: "Intellectual Property", question: "What is a Trade Secret?", answer: "A plan, process, tool, or compilation of info known only to its owner and employees, giving a competitive advantage over competitors." },
            { category: "Intellectual Property", question: "What is Decompilation?", answer: "Translating code to achieve inter-operability. It may constitute <b>Fair Use</b>." },
            { category: "Intellectual Property", question: "What 4 factors determine 'Fair Use'?", answer: "1. Purpose/character of use (educational vs commercial)<br>2. Nature of the copyrighted work<br>3. Amount/substantiality used<br>4. Effect on potential market value" },
            { category: "Intellectual Property", question: "Plagiarism vs Copyright Infringement", answer: "<b>Plagiarism</b>: ETHICAL violation (taking credit for someone's ideas).<br><b>Infringement</b>: LEGAL violation (copying without permission)." }
        ];

        let quizData = [
            { q: "Which ethical theory states that 'The end justifies the means'?", options: ["Consequentialism", "Kantianism", "Virtue Ethics", "Divine Command Theory"], answer: 0 },
            { q: "According to Existentialist Ethics, morality is:", options: ["Based on the Bible", "Subjective, and individuals create their own values", "Relative to cultures only", "Based on self-interest"], answer: 1 },
            { q: "What are the 3 main areas of ethics?", options: ["Meta-ethics, Normative ethics, Applied ethics", "Subjective ethics, Cultural ethics, Moral ethics", "POP ethics, PARA ethics, Theoretical ethics", "Information ethics, Decisional ethics, Accessibility ethics"], answer: 0 },
            { q: "Which level of Computer Ethics involves analytical interest without formal ethical authority?", options: ["POP Computer Ethics", "THEORETICAL Computer Ethics", "PARA Computer Ethics", "APPLIED Computer Ethics"], answer: 2 },
            { q: "RA 10173 is formally known as:", options: ["The Cybercrime Prevention Act", "The Data Privacy Act of 2012", "The Intellectual Property Code", "The E-Commerce Act"], answer: 1 },
            { q: "Taking credit for someone else's work without giving proper credit is fundamentally an ETHICAL violation known as:", options: ["Copyright Infringement", "Decompilation", "Plagiarism", "Identity Theft"], answer: 2 },
            { q: "Are computer programs patentable in the Philippines under RA 8293?", options: ["Yes, if they are open-source", "Yes, if tied to hardware", "No, they are excluded from patents", "No, unless they are used for business"], answer: 2 },
            { q: "In Data Privacy, an entity to whom a controller outsources the processing of personal data is called:", options: ["Personal Information Controller (PIC)", "Data Subject", "National Privacy Commission (NPC)", "Personal Information Processor (PIP)"], answer: 3 },
            { q: "Confidential data protected by law, such as information given by a client to their lawyer, falls under:", options: ["Sensitive Personal Information", "Privileged Information", "Public Information", "Processing Data"], answer: 1 },
            { q: "A high-tech scam that uses spam or pop-up messages to deceive a person into disclosing sensitive information is:", options: ["Phishing", "Identity Theft", "Decompilation", "Data Breach"], answer: 0 }
        ];

        // --- APP STATE ---
        let currentMode = 'flashcards'; // 'flashcards' or 'quiz'
        
        // Flashcard State
        let fcIndex = 0;
        let isFlipped = false;
        let shuffledFlashcards = [...flashcardData];

        // Quiz State
        let qIndex = 0;
        let qScore = 0;
        let qActive = false;
        let shuffledQuiz = [];

        // Initialize Icons
        lucide.createIcons();

        // --- MODE SWITCHING ---
        function switchMode(mode) {
            currentMode = mode;
            
            // Update Tab UI
            const tabFc = document.getElementById('tab-flashcards');
            const tabQz = document.getElementById('tab-quiz');
            
            if(mode === 'flashcards') {
                tabFc.className = "flex items-center gap-2 px-4 py-1.5 rounded-lg text-sm font-semibold transition-all bg-white text-indigo-700 shadow-sm";
                tabQz.className = "flex items-center gap-2 px-4 py-1.5 rounded-lg text-sm font-semibold transition-all text-slate-500 hover:text-slate-700";
                
                document.getElementById('mode-flashcards').classList.remove('hidden');
                document.getElementById('mode-quiz').classList.add('hidden');
                renderFlashcard();
            } else {
                tabQz.className = "flex items-center gap-2 px-4 py-1.5 rounded-lg text-sm font-semibold transition-all bg-white text-indigo-700 shadow-sm";
                tabFc.className = "flex items-center gap-2 px-4 py-1.5 rounded-lg text-sm font-semibold transition-all text-slate-500 hover:text-slate-700";
                
                document.getElementById('mode-quiz').classList.remove('hidden');
                document.getElementById('mode-flashcards').classList.add('hidden');
                if(!qActive) startQuiz();
            }
        }

        // --- FLASHCARD LOGIC ---
        const elFcContainer = document.getElementById('flashcard-inner');

        function renderFlashcard() {
            const card = shuffledFlashcards[fcIndex];
            
            if (isFlipped) {
                isFlipped = false;
                elFcContainer.classList.remove('rotate-y-180');
                setTimeout(() => updateFcDOM(card), 300);
            } else {
                updateFcDOM(card);
            }
        }

        function updateFcDOM(card) {
            document.getElementById('fc-question').innerHTML = card.question;
            document.getElementById('fc-answer').innerHTML = card.answer;
            document.getElementById('fc-category').innerText = card.category;
            
            // Reset AI explanation container when moving to a new card
            const aiContainer = document.getElementById('ai-explanation-container');
            aiContainer.innerHTML = '';
            aiContainer.classList.add('hidden');

            const num = fcIndex + 1;
            const total = shuffledFlashcards.length;
            document.getElementById('fc-progress-text').innerText = `${num} / ${total}`;
            document.getElementById('fc-progress-bar').style.width = `${(num / total) * 100}%`;
        }

        function flipCard() {
            if(currentMode !== 'flashcards') return;
            isFlipped = !isFlipped;
            isFlipped ? elFcContainer.classList.add('rotate-y-180') : elFcContainer.classList.remove('rotate-y-180');
        }

        function nextCard() {
            fcIndex = (fcIndex < shuffledFlashcards.length - 1) ? fcIndex + 1 : 0;
            renderFlashcard();
        }

        function prevCard() {
            fcIndex = (fcIndex > 0) ? fcIndex - 1 : shuffledFlashcards.length - 1;
            renderFlashcard();
        }

        function shuffleCards() {
            shuffledFlashcards = shuffledFlashcards.sort(() => 0.5 - Math.random());
            fcIndex = 0;
            renderFlashcard();
            
            const btn = document.querySelector('button[title="Shuffle Cards"]');
            btn.classList.add('bg-indigo-100');
            setTimeout(() => btn.classList.remove('bg-indigo-100'), 300);
        }

        // --- QUIZ LOGIC ---
        function startQuiz() {
            qActive = true;
            qScore = 0;
            qIndex = 0;
            
            // Deep copy, shuffle options, update correct answer index, then shuffle questions
            shuffledQuiz = quizData.map(q => {
                const correctAnswerText = q.options[q.answer];
                let newOptions = [...q.options].sort(() => 0.5 - Math.random());
                
                return {
                    ...q,
                    options: newOptions,
                    answer: newOptions.indexOf(correctAnswerText)
                };
            }).sort(() => 0.5 - Math.random());
            
            document.getElementById('quiz-results').classList.add('hidden');
            document.getElementById('quiz-active').classList.remove('hidden');
            document.getElementById('quiz-total-num').innerText = shuffledQuiz.length;
            
            renderQuizQuestion();
        }

        function renderQuizQuestion() {
            document.getElementById('quiz-next-btn').classList.add('hidden');
            
            const q = shuffledQuiz[qIndex];
            document.getElementById('quiz-current-num').innerText = qIndex + 1;
            document.getElementById('quiz-score').innerText = qScore;
            document.getElementById('quiz-progress-bar').style.width = `${((qIndex) / shuffledQuiz.length) * 100}%`;
            
            document.getElementById('quiz-question').innerHTML = q.q;
            
            const optionsContainer = document.getElementById('quiz-options');
            optionsContainer.innerHTML = '';
            
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = "quiz-option w-full text-left p-4 rounded-xl border-2 border-slate-200 text-slate-700 font-medium bg-white outline-none flex items-center justify-between";
                btn.innerHTML = `<span>${opt}</span> <i data-lucide="circle" class="w-5 h-5 text-slate-300 icon-placeholder"></i>`;
                btn.onclick = () => handleQuizAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });
            lucide.createIcons();
        }

        function handleQuizAnswer(selectedIndex, btnElement) {
            const q = shuffledQuiz[qIndex];
            const isCorrect = (selectedIndex === q.answer);
            
            // Disable all buttons
            const buttons = document.querySelectorAll('.quiz-option');
            buttons.forEach((btn, idx) => {
                btn.disabled = true;
                btn.classList.add('cursor-not-allowed', 'opacity-80');
                
                const icon = btn.querySelector('.icon-placeholder');
                
                if(idx === q.answer) {
                    btn.classList.add('correct');
                    icon.setAttribute('data-lucide', 'check-circle-2');
                    icon.classList.replace('text-slate-300', 'text-green-600');
                } else if (idx === selectedIndex && !isCorrect) {
                    btn.classList.add('wrong');
                    icon.setAttribute('data-lucide', 'x-circle');
                    icon.classList.replace('text-slate-300', 'text-red-600');
                }
            });
            lucide.createIcons(); // Re-render updated icons

            if(isCorrect) qScore++;
            document.getElementById('quiz-score').innerText = qScore;
            
            // Show Next button
            const nextBtn = document.getElementById('quiz-next-btn');
            nextBtn.classList.remove('hidden');
            nextBtn.innerText = (qIndex === shuffledQuiz.length - 1) ? "View Results" : "Next Question";
            nextBtn.innerHTML += ' <i data-lucide="arrow-right" class="w-5 h-5"></i>';
            lucide.createIcons();
        }

        function nextQuizQuestion() {
            qIndex++;
            if(qIndex >= shuffledQuiz.length) {
                endQuiz();
            } else {
                renderQuizQuestion();
            }
        }

        function endQuiz() {
            qActive = false;
            document.getElementById('quiz-active').classList.add('hidden');
            const results = document.getElementById('quiz-results');
            results.classList.remove('hidden');
            
            document.getElementById('quiz-final-score').innerText = `${qScore}/${shuffledQuiz.length}`;
            
            const percentage = qScore / shuffledQuiz.length;
            const feedbackEl = document.getElementById('quiz-feedback');
            
            if(percentage === 1) { feedbackEl.innerText = "Perfect Score! Master!"; feedbackEl.className = "text-sm font-bold text-green-500 uppercase tracking-wider mb-8"; }
            else if(percentage >= 0.7) { feedbackEl.innerText = "Great Job!"; feedbackEl.className = "text-sm font-bold text-indigo-500 uppercase tracking-wider mb-8"; }
            else if(percentage >= 0.5) { feedbackEl.innerText = "Good Effort! Keep Reviewing."; feedbackEl.className = "text-sm font-bold text-orange-500 uppercase tracking-wider mb-8"; }
            else { feedbackEl.innerText = "Needs Practice. Back to Flashcards!"; feedbackEl.className = "text-sm font-bold text-red-500 uppercase tracking-wider mb-8"; }
        }

        // --- GLOBAL EVENT LISTENERS ---
        document.addEventListener('keydown', (e) => {
            if (currentMode === 'flashcards') {
                if (e.code === 'Space') { e.preventDefault(); flipCard(); }
                else if (e.code === 'ArrowRight') { nextCard(); }
                else if (e.code === 'ArrowLeft') { prevCard(); }
            }
        });

        // Touch swipe for flashcards
        let touchStartX = 0;
        document.getElementById('mode-flashcards').addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, {passive: true});
        document.getElementById('mode-flashcards').addEventListener('touchend', e => {
            let touchEndX = e.changedTouches[0].screenX;
            if (touchEndX < touchStartX - 50) nextCard();
            if (touchEndX > touchStartX + 50) prevCard();
        }, {passive: true});

        // Initialize App
        renderFlashcard();

    </script>
</body>
</html>
